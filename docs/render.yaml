services:
  - type: web
    name: foodgraph-api
    runtime: python
    plan: free
    # Migrations are run manually from a developer machine — see README.
    # We deliberately do NOT run `alembic upgrade head` here because the
    # transaction pooler (port 6543) used at runtime doesn't support the
    # prepared statements Alembic relies on. Either the session pooler
    # (port 5432, host pooler.supabase.com) or the IPv6-only direct
    # connection works for migrations.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      # Set this in the Render dashboard (Service → Environment) to the
      # Supabase Postgres connection string. Use the "Transaction pooler"
      # URL (port 6543) for best behavior at runtime; Supabase already
      # appends ?sslmode=require for you.
      - key: POSTGRES_URI
        sync: false
