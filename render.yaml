services:
  - type: web
    name: foodgraph-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn src.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: POSTGRES_URI
        fromDatabase:
          name: foodgraph-db
          property: connectionString

databases:
  - name: foodgraph-db
    plan: free
    databaseName: foodgraph
    user: foodgraph
